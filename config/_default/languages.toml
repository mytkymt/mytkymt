# Languages
#   Create a `[X]` block for each language you want, where X is the language ID.
#   Refer to https://sourcethemes.com/academic/docs/language/

# Configure the English version of the site.
[en]
  languageCode = "en-us"
  contentDir = "content/en"  # Uncomment for multi-lingual sites, and move English content into `en` sub-folder.

# Configure the Japanese version of the site.
[ja]
 languageCode = "ja-jp"
 contentDir = "content/jp"  # Uncomment for multi-lingual sites, and move English content into `en` sub-folder.

  [[ja.menu.main]]
    name = "Home"
    url = "#about"
    weight = 1

  [[ja.menu.main]]
    name = "経歴"
    url = "#background"
    weight = 10

  [[ja.menu.main]]
    name = "Projects"
    url = "#projects"
    weight = 20

  [[ja.menu.main]]
    name = "Publications"
    url = "#publications"
    weight = 30

  [[ja.menu.main]]
    name = "CV"
    url = "/files/CV.pdf"
    weight = 50

